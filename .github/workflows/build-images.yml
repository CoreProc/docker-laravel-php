name: Build and push images

# Weekly rebuild of every variant so images pick up Alpine/PHP security updates
# from their (floating) base tags, plus manual runs for a single variant.
# Each arch builds and smoke-tests natively (no QEMU), pushes by digest, and a
# merge job stitches the multi-arch manifest — the branch tag on Docker Hub is
# only updated after both arches pass.

on:
  schedule:
    - cron: '0 18 * * 1' # Mondays 18:00 UTC = Tuesdays 02:00 Asia/Manila
  workflow_dispatch:
    inputs:
      branch:
        description: 'Variant branch to build'
        type: choice
        default: all
        options:
          - all
          - 8.3-fpm-alpine
          - 8.3-frankenphp-alpine
          - 8.4-fpm-alpine
          - 8.4-frankenphp-alpine

permissions:
  contents: read

concurrency:
  group: build-images
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.set.outputs.branches }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.branch }}" != "all" ]; then
            echo 'branches=["${{ inputs.branch }}"]' >> "$GITHUB_OUTPUT"
          else
            echo 'branches=["8.3-fpm-alpine","8.3-frankenphp-alpine","8.4-fpm-alpine","8.4-frankenphp-alpine"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJSON(needs.prepare.outputs.branches) }}
        platform:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # No cache-from/cache-to on purpose: the weekly rebuild must re-resolve
      # the base image and apk/pecl packages to pick up security updates.
      - name: Build for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.platform.arch }}
          load: true
          tags: smoke-test:${{ matrix.branch }}

      - name: Smoke test (native ${{ matrix.platform.arch }})
        run: |
          docker run --rm smoke-test:${{ matrix.branch }} sh -ec '
            php -v
            supercronic -version
            echo "* * * * * true" > /tmp/ct
            supercronic -test /tmp/ct'

      - name: Push by digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.platform.arch }}
          outputs: type=image,name=coreproc/laravel-php,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.branch }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-and-tag:
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJSON(needs.prepare.outputs.branches) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.branch }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest and tag
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create -t coreproc/laravel-php:${{ matrix.branch }} \
            $(printf 'coreproc/laravel-php@sha256:%s ' *)

      - name: Inspect published tag
        run: docker buildx imagetools inspect coreproc/laravel-php:${{ matrix.branch }}
